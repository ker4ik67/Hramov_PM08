<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учусь в сети — Онлайн-курсы</title>
    <link rel="stylesheet" href="./assets/style.css">

    <header class="header">
